<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f9ff"/>
      <stop offset="50%" stop-color="#eef7ff"/>
      <stop offset="100%" stop-color="#e8faf3"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1976d2"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00897b"/>
      <stop offset="100%" stop-color="#26c6a0"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#26c6a0"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f8ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softsh">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1565c0" flood-opacity="0.12"/>
    </filter>
    <filter id="cardsh">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0d47a1" flood-opacity="0.09"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="600" height="400" rx="16"/>
    </clipPath>
  </defs>

